# Fly.io Configuration
# Generated for YOLOv8 ML API deployment

app = "neat-now-api"
primary_region = "sfo"  # San Francisco - change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    grace_period = "10s"
    interval = 30000
    timeout = 5000
    path = "/api/health/"
    protocol = "http"
    restart_limit = 5

[checks]
  [checks.release_cmd]
    type = "release"
    grace_period = "10s"
    timeout = "30s"

[[vm]]
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"
  processes = ["app"]

[deploy]
  strategy = "rolling"

[processes]
  app = "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

# Health check
[healthcheck]
  enabled = true
  grace_period = "10s"
  interval = 30000
  timeout = 5000
  method = "get"
  path = "/api/health/"
